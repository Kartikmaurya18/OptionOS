apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: straddle
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    scrape_configs:
      - job_name: straddle-backend
        metrics_path: /metrics
        static_configs:
          # In-cluster: the backend Service's DNS name, not
          # host.docker.internal (that only means something on a dev
          # machine talking to a host process outside the cluster).
          - targets: ["backend:8000"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: straddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.55.1
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: straddle
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
