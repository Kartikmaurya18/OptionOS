apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-datasources
  namespace: straddle
data:
  datasource.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning-dashboards
  namespace: straddle
data:
  dashboards.yml: |
    apiVersion: 1
    providers:
      - name: straddle
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        options:
          path: /etc/grafana/dashboards
---
# The actual dashboard JSON (infra/grafana/dashboards/straddle-overview.json)
# is NOT duplicated into this YAML file -- that would give it two sources
# of truth that drift apart the first time either one gets edited. Generate
# this ConfigMap from the real file instead, right before applying it:
#
#   kubectl create configmap grafana-dashboards -n straddle \
#     --from-file=../grafana/dashboards/straddle-overview.json \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# (A Kustomize configMapGenerator does the same thing declaratively if this
# becomes part of a bigger kustomization.yaml later.)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: straddle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secrets
                  key: admin-password
          volumeMounts:
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /etc/grafana/dashboards
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: provisioning-datasources
          configMap:
            name: grafana-provisioning-datasources
        - name: provisioning-dashboards
          configMap:
            name: grafana-provisioning-dashboards
        - name: dashboards
          configMap:
            name: grafana-dashboards # generated via the kubectl command above
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: straddle
type: Opaque
stringData:
  admin-password: "REPLACE_ME" # see backend-config.yaml's note on real secret management
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: straddle
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
